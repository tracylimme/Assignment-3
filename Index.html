<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Add Account</h2>

    <div class="form-box">
        <h4>Account Information</h4>
        <p class="note">You can only select one account at a time</p>

        <!-- Select -->
        <div class="input-group">
            <select>
                <option>Facebook</option>
                <option>Instagram</option>
                <option>Twitter</option>
            </select>
        </div>

        <!-- Name -->
        <div class="input-group">
            <label>Name</label>
            <input type="text" placeholder="5 years">
            <small>For e.g., 4 Years Facebook Account</small>
        </div>

        <!-- Description -->
        <div class="input-group">
            <label>Description</label>
            <textarea placeholder="Acctbazaar.com"></textarea>
        </div>

        <!-- Price -->
        <div class="input-group">
            <input type="text" placeholder="Enter your price">
        </div>

        <!-- Button -->
        <button>Continue</button>
    </div>
</div>

</body>
</html>
